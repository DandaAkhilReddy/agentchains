name: Build & Deploy to Azure

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name agentchainsacr

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            agentchainsacr.azurecr.io/agentchains-marketplace:${{ github.sha }}
            agentchainsacr.azurecr.io/agentchains-marketplace:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy new revision to Container Apps
        run: |
          az containerapp update \
            --name agentchains-marketplace \
            --resource-group rg-agentchains \
            --image agentchainsacr.azurecr.io/agentchains-marketplace:${{ github.sha }}

      - name: Smoke test new revision
        run: |
          FQDN=$(az containerapp show \
            --name agentchains-marketplace \
            --resource-group rg-agentchains \
            --query properties.configuration.ingress.fqdn \
            -o tsv)
          echo "Container App FQDN: $FQDN"
          echo "Waiting 60s for new revision to activate..."
          sleep 60
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$FQDN/api/v1/health")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed on attempt $i"
              break
            fi
            echo "Attempt $i: status=$STATUS, retrying in 15s..."
            sleep 15
          done
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed after 5 attempts"
            exit 1
          fi

